<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>PulseCore</title>
    <script type="module">
        import { initThemeSync } from '/js/modules/theme-sync.js';
        initThemeSync();
    </script>
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PulseCore">
    <link rel="icon" type="image/png" href="/img.png">
    <link rel="stylesheet" href="/css/app.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{screens:{'xs':'475px','sm':'640px','md':'768px','lg':'1024px','xl':'1280px','2xl':'1536px'}}}}</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>
    <style>
        body { padding-top: env(safe-area-inset-top, 0px); }

        /* Шторка заказных отчётов сверху по центру */
        .report-dropdown {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%) translateY(-120%);
            z-index: 100;
            background: rgba(24, 24, 27, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 20px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .report-dropdown.open {
            transform: translateX(-50%) translateY(0);
        }
        .report-dropdown-handle {
            width: 32px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin: 0 auto 16px;
        }
        .report-backdrop {
            position: fixed;
            inset: 0;
            z-index: 99;
            background: rgba(0,0,0,0.3);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .report-backdrop.open {
            opacity: 1;
            pointer-events: auto;
        }
        /* Бейдж отчёта */
        .report-badge {
            background: rgba(99,102,241,0.12) !important;
            border-color: rgba(99,102,241,0.25) !important;
            gap: 7px;
            padding: 5px 12px !important;
            transition: all 0.3s ease;
        }
        .report-badge:hover {
            background: rgba(99,102,241,0.22) !important;
            border-color: rgba(99,102,241,0.4) !important;
            transform: scale(1.05);
        }
        .report-badge-icon {
            animation: mailPulse 2s ease-in-out infinite;
            color: #818cf8;
        }
        .report-badge-count {
            background: #818cf8;
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
        }
        @keyframes mailPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.8; }
        }

        /* Стили карточек отчётов */
        .report-sheet-title {
            font-size: 1rem;
            font-weight: 600;
            color: #e5e5e5;
            margin-bottom: 16px;
            text-align: center;
        }
        .report-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .report-item-period {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #a78bfa;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .report-item-schedule {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #a1a1aa;
            font-size: 0.8rem;
            margin-bottom: 12px;
        }
        .report-progress {
            margin-bottom: 12px;
        }
        .report-progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            margin-bottom: 6px;
            overflow: hidden;
        }
        .report-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #818cf8, #a78bfa);
            border-radius: 2px;
            transition: width 1s ease;
        }
        .report-progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #71717a;
        }
        .report-progress-pct {
            color: #a78bfa;
            font-weight: 600;
        }
        .report-progress-time {
            color: #71717a;
        }
        .report-cancel-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 8px;
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.15);
            border-radius: 10px;
            color: #f87171;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .report-cancel-btn:hover {
            background: rgba(239,68,68,0.15);
            border-color: rgba(239,68,68,0.3);
        }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">
<div class="bg-mesh"></div>
<div class="bg-grid"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="nebula"></div>
<div class="stars" id="starsContainer"></div>
<div id="ptrIndicator" class="ptr-indicator"></div>

<div id="editTournamentModal" class="modal-overlay hidden" onclick="if(event.target===this)closeEditTournamentModal()">
    <div class="modal-box">
        <h3 class="text-white font-semibold mb-1">✏️ Скорректировать турнир</h3>
        <p class="text-xs text-zinc-400 mb-4">Ручная корректировка суммы</p>
        <p class="text-sm text-zinc-300 mb-2" id="editTournamentInfo"></p>
        <div class="mb-4">
            <label class="text-xs text-zinc-400 mb-1 block">Сумма (₽)</label>
            <input id="editTournamentAmount" type="number" step="0.01" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-white focus:border-indigo-500 focus:outline-none">
        </div>
        <div class="flex gap-2">
            <button onclick="saveTournamentEdit()" class="btn-gold flex-1 py-2 rounded-lg text-sm">💾 Сохранить</button>
            <button onclick="closeEditTournamentModal()" class="flex-1 bg-zinc-700 hover:bg-zinc-600 text-white py-2 rounded-lg text-sm">Отмена</button>
        </div>
        <p id="editTournamentError" class="text-red-400 text-xs mt-2 hidden"></p>
    </div>
</div>

<div id="burgerMenuContainer"></div>

<aside class="hidden md:flex glass-sidebar w-72 min-h-screen p-6 flex-col relative z-10 shrink-0">
    <div class="flex items-center gap-3 mb-10 px-1">
        <img src="/img.png" alt="PulseCore" class="w-11 h-11 rounded-xl shadow-lg object-cover">
        <div>
            <h1 class="text-lg font-bold bg-gradient-to-r from-indigo-400 to-indigo-300 bg-clip-text text-transparent tracking-tight">PulseCore</h1>
            <p id="sidebarPlayerName" class="text-xs text-zinc-400"></p>
        </div>
    </div>
    <nav class="flex flex-col gap-1 flex-1">
        <div class="nav-item active" onclick="goHome()" id="nav-home">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
            <div><div class="font-medium text-sm">Главная</div><div class="text-xs text-zinc-500">Обзор</div></div>
        </div>
        <div class="nav-item" onclick="showAction('halls')" id="nav-halls">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
            <div><div class="font-medium text-sm">Расписание</div><div class="text-xs text-zinc-500">Турниры и составы</div></div>
        </div>
        <div class="nav-item" onclick="showAction('sum')" id="nav-sum">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span>
            <div><div class="font-medium text-sm">Сумма за период</div><div class="text-xs text-zinc-500">Подсчёт и список</div></div>
        </div>
        <div class="nav-item" onclick="window.location.href='/live'">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></span>
            <div><div class="font-medium text-sm">Live</div><div class="text-xs text-zinc-500">Трансляции</div></div>
        </div>
        <div class="nav-item" onclick="window.location.href='/analytics'">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
            <div><div class="font-medium text-sm">Аналитика</div><div class="text-xs text-zinc-500">Статистика по лигам</div></div>
        </div>
        <div class="nav-item admin-item hidden" id="nav-admin" onclick="window.location.href='/admin'">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span>
            <div><div class="font-medium text-sm text-emerald-400">Админка</div></div>
        </div>
        <div class="nav-item" onclick="window.location.href='/profile'">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
            <div><div class="font-medium text-sm">Настройки</div><div class="text-xs text-zinc-500">Аккаунт и подписка</div></div>
        </div>
    </nav>
    <button onclick="logout()" class="flex items-center gap-2 text-zinc-500 hover:text-red-400 text-sm mt-auto py-2 px-3 rounded-lg hover:bg-red-500/5 w-full">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Выйти</span>
    </button>
</aside>

<main class="flex-1 relative z-10 p-4 sm:p-6 md:p-7 lg:p-9 xl:p-10">
    <div id="contentArea" class="max-w-5xl mx-auto w-full">
        <div id="homePage">
            <div class="mb-6 sm:mb-8">
                <div class="flex items-center justify-between gap-2 flex-wrap">
                    <div class="flex items-center gap-2 sm:gap-3 flex-wrap">
                        <h2 class="text-2xl sm:text-3xl lg:text-4xl font-extrabold text-white"><span id="playerName"></span></h2>
                        <span id="proBadge" class="pro-badge hidden"><span class="pro-diamond">💎</span>PRO</span>
                        <span id="reportBadge"></span>
                    </div>
                    <button onclick="toggleMobileMenu()" class="md:hidden w-9 h-9 flex items-center justify-center rounded-lg bg-white/5 hover:bg-white/10 active:scale-90 text-white">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                </div>
                <p class="text-zinc-400 mt-1 text-xs sm:text-sm" id="subStatusText"></p>
                <div id="pushToggleContainer" class="hidden mt-2 flex items-center gap-2">
                    <span class="text-xs text-zinc-400">🔔 Push-уведомления</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="pushToggle" class="sr-only peer" onchange="togglePush()">
                        <div class="w-9 h-5 bg-zinc-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-zinc-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-500"></div>
                    </label>
                </div>
                <div id="onlineCounter" class="hidden mt-2 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                    <span class="text-xs text-zinc-400">Онлайн: <span id="onlineCount" class="text-emerald-400 font-semibold">0</span></span>
                </div>
            </div>

            <div id="topWeekBanner" class="hidden mb-4 px-4 py-2.5 bg-[rgba(255,255,255,0.025)] border border-white/5 rounded-xl flex items-center gap-3 cursor-pointer transition-all duration-300 hover:bg-[rgba(255,255,255,0.06)]" onclick="toggleTopWeek()">
                <span class="text-xl">🏆</span>
                <div class="flex-1">
                    <p class="text-sm font-semibold text-white">Зал славы</p>
                    <p class="text-xs text-zinc-400" id="topWeekPreview">Нажмите чтобы посмотреть</p>
                </div>
                <span class="text-zinc-400 text-sm transition-transform duration-300" id="topWeekArrow">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                </span>
            </div>
            <div id="topWeekPanel" class="hidden widget-card rounded-2xl p-5 sm:p-6 mb-6 content-panel max-h-[500px] overflow-y-auto"></div>

            <div id="dashboardWidgets" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </div>

        <div id="actionPage" class="hidden content-panel">
            <div class="mb-6 sm:mb-8">
                <h2 class="text-2xl sm:text-3xl font-extrabold text-white" id="actionTitle"></h2>
                <p class="text-zinc-400 mt-1.5 text-sm" id="actionSubtitle"></p>
            </div>
            <div id="actionContent"></div>
        </div>
    </div>
</main>

<!-- Шторка заказных отчётов -->
<div class="report-backdrop" id="reportBackdrop" onclick="closeScheduledReports()"></div>
<div class="report-dropdown" id="reportDropdown">
    <div class="report-dropdown-handle"></div>
    <div id="reportSheetContent"></div>
</div>

<script type="module" src="/js/app.js"></script>
<script type="module">
    import { initBurgerMenu } from '/js/modules/burger-menu.js';
    import { initRoleCheck } from '/js/modules/role-check.js';
    initBurgerMenu();
    initRoleCheck();
</script>
<script type="module">
    import { initStars } from '/js/modules/stars.js';
    initStars();
</script>
<script type="module">
    import { initThemePicker, toggleThemeSheet, setTheme } from '/js/modules/theme-picker.js';
    initThemePicker();
    window.toggleThemeSheet = toggleThemeSheet;
    window.setTheme = setTheme;
</script>
<script type="module" src="/js/modules/scheduled-report.js"></script>
</body>
</html>
