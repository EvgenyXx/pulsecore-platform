<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>PulseCore — Live</title>
    <script type="module">
        import { initThemeSync } from '/js/modules/theme-sync.js';
        initThemeSync();
    </script>
    <link rel="icon" type="image/png" href="/img.png">
    <link rel="stylesheet" href="/css/app.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { padding-top: env(safe-area-inset-top, 0px); }
        .live-card {
            background: rgba(255,255,255,0.025); border-radius: 20px; padding: 24px;
            border: 1px solid rgba(99,102,241,0.15); transition: all 0.3s;
            cursor: pointer; backdrop-filter: blur(20px);
        }
        .live-card:hover {
            border-color: rgba(99,102,241,0.35);
            box-shadow: 0 0 40px rgba(99,102,241,0.1); transform: translateY(-2px);
        }
        .live-badge {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #fff; font-size: 0.65rem; font-weight: 700;
            padding: 3px 10px; border-radius: 20px;
            display: inline-flex; align-items: center; gap: 4px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .btn-live {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #fff; font-weight: 600; border: none;
            border-radius: 12px; padding: 10px 20px;
            cursor: pointer; font-size: 0.85rem; width: 100%;
        }
        .btn-live:hover { opacity: 0.9; }
        .hall-filter-tag {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px; padding: 6px 14px; font-size: 0.72rem; color: #a1a1aa;
            cursor: pointer; white-space: nowrap; transition: all 0.2s; font-weight: 500;
        }
        .hall-filter-tag.active {
            background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.35);
            color: #818cf8; font-weight: 600;
        }
        .hall-filter-tag:hover { background: rgba(99,102,241,0.08); }
    </style>
</head>
<body>
<div class="bg-mesh"></div><div class="bg-grid"></div>
<div class="nebula"></div><div class="stars" id="starsContainer"></div>

<div id="burgerMenuContainer"></div>

<main class="relative z-10 p-4 sm:p-6 md:p-7 lg:p-9 xl:p-10 min-h-screen">
    <div class="max-w-3xl mx-auto">

        <div class="flex items-center justify-between mb-4">
            <div></div>
            <button onclick="toggleMobileMenu()" class="md:hidden w-9 h-9 flex items-center justify-center rounded-lg bg-white/5 hover:bg-white/10 active:scale-90 text-white">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
        </div>

        <div class="text-center pt-4 pb-6">
            <div class="w-14 h-14 rounded-2xl bg-indigo-500/20 flex items-center justify-center mx-auto mb-3 shadow-lg shadow-indigo-500/10">
                <span class="text-xl">📡</span>
            </div>
            <h1 class="text-2xl font-extrabold bg-gradient-to-r from-indigo-400 to-indigo-200 bg-clip-text text-transparent">Live-трансляции</h1>
            <p class="text-zinc-500 text-xs mt-1" id="subtitle">Загрузка...</p>
        </div>

        <div id="tabFilter" class="hidden flex flex-wrap gap-2 mb-4 justify-center">
            <span class="hall-filter-tag tab-filter-tag active" data-tab="live">LIVE</span>
            <span class="hall-filter-tag tab-filter-tag" data-tab="upcoming">Скоро</span>
            <span class="hall-filter-tag tab-filter-tag" data-tab="finished">Завершён</span>
        </div>

        <div id="hallFilter" class="hidden flex flex-wrap gap-2 mb-5 justify-center"></div>

        <div id="loading" class="text-center py-20">
            <div class="spinner mb-4"></div>
            <p class="text-zinc-500 text-sm">Загрузка...</p>
        </div>

        <div id="noSubBlock" class="hidden max-w-md mx-auto mt-10">
            <div class="widget-card rounded-2xl p-8 text-center">
                <div class="w-16 h-16 rounded-full bg-indigo-500/10 flex items-center justify-center mx-auto mb-4">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
                <h3 class="text-xl font-bold text-white mb-2">Требуется подписка</h3>
                <p class="text-zinc-400 text-sm mb-5">Оформите подписку PRO для доступа к трансляциям</p>
                <a href="/subscribe" class="inline-block bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl px-6 py-3 text-sm transition-all">Оформить подписку</a>
                <br><a href="/dashboard" class="text-xs text-zinc-500 mt-4 inline-block hover:text-zinc-300">← На главную</a>
            </div>
        </div>

        <div id="liveList" class="space-y-4 hidden"></div>

        <div id="lineupsSection" class="hidden mt-8">
            <h2 class="text-lg font-bold text-white mb-3">📋 Составы на сегодня</h2>
            <div id="lineupsContainer" class="space-y-2"></div>
        </div>

        <div id="empty" class="text-center py-20 hidden">
            <div class="text-4xl mb-3">🎬</div>
            <p class="text-zinc-400 font-medium">Нет активных трансляций</p>
            <p class="text-zinc-600 text-sm mt-1">Турниры начнутся — появятся здесь</p>
        </div>

    </div>
</main>

<script type="module">
    import { initBurgerMenu } from '/js/modules/burger-menu.js';
    import { initRoleCheck } from '/js/modules/role-check.js';
    initBurgerMenu();
    initRoleCheck();
</script>
<script>
    async function logout() {
        await fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' });
        window.location.href = '/';
    }
</script>
<script type="module">
    import { initStars } from '/js/modules/stars.js';
    initStars();
</script>
<script type="module" src="/js/modules/live.js"></script>
<script type="module">
    import { initThemePicker, toggleThemeSheet, setTheme } from '/js/modules/theme-picker.js';
    initThemePicker();
    window.toggleThemeSheet = toggleThemeSheet;
    window.setTheme = setTheme;
</script>
</body>
</html>
