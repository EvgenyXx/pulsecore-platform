<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>PulseCore — Подписка</title>
    <script type="module">
        import { initThemeSync } from '/js/modules/theme-sync.js';
        initThemeSync();
    </script>
    <link rel="icon" type="image/png" href="/img.png">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <style>
        body { padding-top: env(safe-area-inset-top, 0px); }
        .plan-card {
            background: rgba(255,255,255,0.025); border-radius: 16px; padding: 20px 16px;
            border: 1px solid rgba(99,102,241,0.12); cursor: pointer; position: relative; overflow: hidden;
            transition: all 0.25s ease; min-width: 160px; max-width: 200px; flex-shrink: 0;
            scroll-snap-align: center; text-align: center;
        }
        .plan-card:active { transform: scale(0.97); }
        .plan-card.selected { border-color: #6366f1; box-shadow: 0 0 30px rgba(99,102,241,0.20); }
        .plan-card.popular { border-color: rgba(99,102,241,0.35); }
        .plan-card.popular::before {
            content: "ВЫГОДНО"; position: absolute; top: 10px; right: -25px;
            background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff;
            font-size: 0.55rem; font-weight: 700; padding: 2px 30px;
            transform: rotate(45deg); letter-spacing: 0.5px;
        }
        .price-old { text-decoration: line-through; color: #71717a; font-size: 0.8rem; }
        .pro-badge {
            background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff;
            font-weight: 700; font-size: 0.6rem; padding: 2px 10px; border-radius: 20px;
            display: inline-flex; align-items: center; gap: 3px;
        }
        .amount-gold { color: #818cf8; font-weight: 700; }
        .btn-pay {
            background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff;
            font-weight: 600; border: none; border-radius: 12px; padding: 14px 24px;
            cursor: pointer; font-size: 1rem; transition: all 0.2s ease; width: 100%;
        }
        .btn-pay:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-pay:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .plans-scroll { display: flex; gap: 12px; overflow-x: auto; padding: 4px 2px 8px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .plans-scroll::-webkit-scrollbar { display: none; }
        @media (min-width: 768px) {
            .plan-card { min-width: 200px; max-width: 240px; padding: 28px 24px; }
            .plans-scroll { justify-content: center; overflow-x: visible; }
        }
    </style>
</head>
<body class="flex min-h-screen">
<div class="bg-mesh"></div><div class="bg-grid"></div><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div>
<div class="nebula"></div>
<div class="stars" id="starsContainer"></div>

<div id="burgerMenuContainer"></div>

<aside class="hidden md:flex glass-sidebar w-64 min-h-screen p-5 flex-col relative z-10 shrink-0">
    <div class="flex items-center gap-2.5 mb-8 px-1">
        <img src="/img.png" alt="PulseCore" class="w-9 h-9 rounded-xl object-cover">
        <h1 class="text-base font-bold bg-gradient-to-r from-indigo-400 to-indigo-300 bg-clip-text text-transparent">PulseCore</h1>
    </div>
    <nav class="flex flex-col gap-0.5 flex-1">
        <a href="/dashboard" class="nav-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> <span>Главная</span></a>
        <a href="/dashboard" class="nav-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> <span>Расписание</span></a>
        <a href="/dashboard" class="nav-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> <span>Сумма за период</span></a>
        <a href="/analytics" class="nav-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg> <span>Аналитика</span></a>
        <div class="nav-item active"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg> <span>Подписка</span></div>
        <a href="/profile" class="nav-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> <span>Профиль</span></a>
    </nav>
    <button onclick="logout()" class="flex items-center gap-2 text-zinc-500 hover:text-red-400 text-sm mt-auto py-2 px-3 rounded-lg hover:bg-red-500/5 w-full">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Выйти</button>
</aside>

<main class="flex-1 p-4 md:p-8 relative z-10 overflow-y-auto">
    <div class="max-w-xl">
        <div class="flex items-center justify-between gap-3 mb-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-indigo-500/20 flex items-center justify-center">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                </div>
                <div>
                    <h2 class="text-lg font-bold text-white">Подписка <span class="pro-badge align-middle ml-1">PRO</span></h2>
                    <p class="text-xs text-zinc-400" id="pageSubtitle">Загрузка...</p>
                </div>
            </div>
            <button onclick="toggleMobileMenu()" class="md:hidden w-9 h-9 flex items-center justify-center rounded-lg bg-white/5 hover:bg-white/10 active:scale-90 text-white">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
        </div>

        <div id="activeSubBlock" class="hidden">
            <div class="widget-card rounded-2xl p-8 text-center">
                <div class="w-16 h-16 rounded-full bg-emerald-500/20 flex items-center justify-center mx-auto mb-4">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <h3 class="text-xl font-bold text-white mb-2">Подписка активна</h3>
                <p class="text-zinc-400" id="activeSubText"></p>
            </div>
        </div>

        <div id="plansBlock" class="hidden">
            <p class="text-sm text-zinc-400 mb-3">Выберите тарифный план</p>
            <div class="plans-scroll mb-5" id="plansContainer"></div>
            <div id="messageBox" class="text-sm text-center mb-4 hidden"></div>
            <button onclick="handlePay()" id="payBtn" class="btn-pay" disabled>Оплатить</button>
        </div>
    </div>
</main>

<script type="module" src="/js/subscribe-app.js"></script>
<script type="module">
    import { initBurgerMenu } from '/js/modules/burger-menu.js';
    import { initRoleCheck } from '/js/modules/role-check.js';
    initBurgerMenu();
    initRoleCheck();
</script>
<script type="module">
    import { initStars } from '/js/modules/stars.js';
    initStars();
</script>
<script type="module">
    import { initThemePicker, toggleThemeSheet, setTheme } from '/js/modules/theme-picker.js';
    initThemePicker();
    window.toggleThemeSheet = toggleThemeSheet;
    window.setTheme = setTheme;
</script>
</body>
</html>
