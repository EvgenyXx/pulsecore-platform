<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>PulseCore — Админ-панель</title>
    <script type="module">
        import { initThemeSync } from '/js/modules/theme-sync.js';
        initThemeSync();
    </script>
    <link rel="icon" type="image/png" href="/img.png">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{screens:{'xs':'475px','sm':'640px','md':'768px','lg':'1024px','xl':'1280px'}}}}</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <style>
        body { font-family: 'Inter', sans-serif; min-height: 100dvh; background: #0c0c18; -webkit-font-smoothing: antialiased; padding-top: env(safe-area-inset-top, 0px); }
        .btn { font-weight: 600; border: none; border-radius: 10px; padding: 10px 16px; cursor: pointer; font-size: 0.85rem; width: 100%; text-align: center; }
        .btn-indigo { background: #6366f1; color: #fff; }
        .btn-indigo:hover { background: #4f46e5; }
        .btn-emerald { background: #10b981; color: #fff; }
        .btn-emerald:hover { background: #059669; }
        .btn-danger { background: rgba(239,68,68,0.12); color: #f87171; border: 1px solid rgba(239,68,68,0.20); }
        .btn-danger:hover { background: rgba(239,68,68,0.22); }
        .btn-amber { background: #f59e0b; color: #000; }
        .btn-amber:hover { background: #d97706; }
        .btn-ghost { background: transparent; color: #a1a1aa; border: 1px solid rgba(255,255,255,0.06); padding: 8px 14px; font-size: 0.82rem; font-weight: 500; }
        .btn-ghost:hover { background: rgba(255,255,255,0.04); color: #e5e5e5; }
        .input { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; color: #e5e5e5; padding: 10px 13px; font-size: 0.88rem; width: 100%; outline: none; font-family: 'Inter'; }
        .input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.08); }
        .player-row { background: rgba(255,255,255,0.02); border-radius: 12px; padding: 12px 14px; cursor: pointer; border: 1px solid rgba(255,255,255,0.04); }
        .player-row:hover { background: rgba(99,102,241,0.06); border-color: rgba(99,102,241,0.20); }
        .badge { font-size: 0.68rem; padding: 2px 7px; border-radius: 5px; white-space: nowrap; }
        .badge-green { background: rgba(16,185,129,0.12); color: #34d399; border: 1px solid rgba(16,185,129,0.20); }
        .badge-red { background: rgba(239,68,68,0.10); color: #f87171; border: 1px solid rgba(239,68,68,0.15); }
        .badge-amber { background: rgba(245,158,11,0.12); color: #fbbf24; border: 1px solid rgba(245,158,11,0.20); }
        @media (min-width: 768px) { .btn { width: auto; } }
        .spinner-sm { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.12); border-top-color: #6366f1; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .tab-sheet-overlay {
            position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; align-items: flex-end; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .tab-sheet-overlay.open { opacity: 1; pointer-events: auto; }
        .tab-sheet {
            background: #18181b; border-radius: 20px 20px 0 0; width: 100%; max-width: 500px;
            padding: 20px 16px 32px; transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            border: 1px solid rgba(255,255,255,0.06); border-bottom: none;
            box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
        }
        .tab-sheet-overlay.open .tab-sheet { transform: translateY(0); }
        .tab-sheet-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 18px; }
        .tab-sheet-btn {
            display: flex; align-items: center; gap: 12px; width: 100%; padding: 14px 16px;
            border-radius: 12px; font-size: 0.9rem; font-weight: 500; cursor: pointer;
            border: none; text-align: left; color: #d4d4d8;
            background: rgba(255,255,255,0.03); margin-bottom: 4px;
        }
        .tab-sheet-btn:hover { background: rgba(99,102,241,0.08); }
        .tab-sheet-btn.active { background: rgba(99,102,241,0.12); color: #c7d2fe; font-weight: 600; }
        .tabs-btn {
            display: flex; align-items: center; gap: 5px; padding: 6px 12px;
            border-radius: 8px; font-size: 0.78rem; font-weight: 500; cursor: pointer;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            color: #a1a1aa; transition: all 0.2s;
        }
        .tabs-btn:hover { background: rgba(99,102,241,0.1); border-color: rgba(99,102,241,0.25); color: #c7d2fe; }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">
<div class="bg-mesh"></div><div class="bg-grid"></div><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div>
<div class="stars" id="starsContainer"></div>

<div id="burgerMenuContainer"></div>

<aside class="hidden md:flex glass-sidebar w-64 min-h-screen p-5 flex-col relative z-10 shrink-0">

        <img src="/img.png" class="w-9 h-9 rounded-xl object-cover">
        <div>

            <p class="text-xs text-zinc-500">Админ-панель</p>
        </div>
    </div>
    <nav class="flex flex-col gap-0.5 flex-1">
        <div class="nav-item active" id="nav-players" onclick="showSection('players')">

            <div><div class="font-medium text-sm">Игроки</div></div>
        </div>
        <div class="nav-item" id="nav-subscriptions" onclick="showSection('subscriptions')">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
            <div><div class="font-medium text-sm">Подписки</div></div>
        </div>
        <div class="nav-item" id="nav-prices" onclick="showSection('prices')">

            <div><div class="font-medium text-sm">Цены</div></div>
        </div>
        <div class="nav-item" id="nav-calculate" onclick="showSection('calculate')">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/></svg>
            <div><div class="font-medium text-sm">Расчёт</div></div>
        </div>
        <div class="nav-item" id="nav-broadcast" onclick="showSection('broadcast')">

<main class="flex-1 relative z-10 p-4 sm:p-6 md:p-8">
    <div class="max-w-2xl">

        <div id="section-players">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-extrabold text-white">Игроки</h2>
                <div class="flex items-center gap-2">
                    <button onclick="toggleAdminSheet()" class="md:hidden tabs-btn">Меню ▴</button>
                    <button onclick="window.toggleMobileMenu()" class="md:hidden w-9 h-9 flex items-center justify-center rounded-lg bg-white/5 hover:bg-white/10 active:scale-90 text-white">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                </div>
            </div>
            <div class="widget-card rounded-2xl p-4 mb-3">
                <input id="playerSearchInput" type="text" placeholder="Поиск игрока..." class="input" oninput="searchPlayers('players')">
                <div id="playerSearchResults" class="mt-3 space-y-1 hidden"></div>
            </div>
            <div id="playerSelected" class="widget-card rounded-2xl p-4 hidden">
                <div class="mb-3">
                    <p class="text-white font-semibold" id="playerSelName"></p>
                    <p class="text-xs text-zinc-500" id="playerSelEmail"></p>
                    <div class="flex gap-1 flex-wrap mt-1" id="playerSelBadges"></div>
                </div>
                <div class="flex flex-col gap-2">
                    <button onclick="togglePlayerRole('ROLE_ADMIN')" id="grantAdminBtn" class="btn btn-amber hidden">Сделать админом</button>
                    <button onclick="togglePlayerRole('ROLE_ADMIN')" id="revokeAdminBtn" class="btn btn-danger hidden">Разжаловать</button>
                    <button onclick="deletePlayerTournaments()" class="btn btn-danger">Удалить все турниры</button>
                    <button onclick="resyncPlayerTournaments()" class="btn btn-indigo">Перезагрузить историю</button>
                    <button onclick="deletePlayerAccount()" class="btn btn-danger">Удалить аккаунт</button>
                </div>
                <p id="playerMsg" class="text-xs text-center mt-2 hidden"></p>
            </div>
        </div>

        <div id="section-subscriptions" class="hidden">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-extrabold text-white">Подписки</h2>
                <div class="flex items-center gap-2">
                    <button onclick="toggleAdminSheet()" class="md:hidden tabs-btn">Меню ▴</button>
                    <button onclick="window.toggleMobileMenu()" class="md:hidden w-9 h-9 flex items-center justify-center rounded-lg bg-white/5 hover:bg-white/10 active:scale-90 text-white">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                </div>
            </div>
            <div class="widget-card rounded-2xl p-4 mb-3">
                <input id="subSearchInput" type="text" placeholder="Поиск игрока..." class="input" oninput="searchPlayers('sub')">
                <div id="subSearchResults" class="mt-3 space-y-1 hidden"></div>
            </div>
            <div id="subSelectedPlayer" class="widget-card rounded-2xl p-4 hidden">
                <div class="mb-3">
                    <p class="text-white font-semibold" id="subSelName"></p>
                    <p class="text-xs text-zinc-500" id="subSelEmail"></p>
                    <div class="flex gap-1 flex-wrap mt-1" id="subSelBadges"></div>
                </div>
                <div class="flex flex-col gap-2">
                    <button onclick="giveSub(30)" class="btn btn-emerald">Выдать 30 дней</button>
                    <button onclick="giveSub(60)" class="btn btn-indigo">Выдать 60 дней</button>
                    <button onclick="removeSub()" id="removeSubBtn" class="btn btn-danger hidden">Отключить подписку</button>

            </div>
        </div>

        <div id="section-prices" class="hidden">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-extrabold text-white">Цены</h2>
                <div class="flex items-center gap-2">
                    <button onclick="toggleAdminSheet()" class="md:hidden tabs-btn">Меню ▴</button>
                    <button onclick="window.toggleMobileMenu()" class="md:hidden w-9 h-9 flex items-center justify-center rounded-lg bg-white/5 hover:bg-white/10 active:scale-90 text-white">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                </div>
            </div>
            <div class="widget-card rounded-2xl p-4 mb-3">

                    <div><label class="text-xs text-zinc-400 mb-1 block">1 мес (₽)</label><input id="price1Input" type="number" min="1" class="input"></div>
                    <div><label class="text-xs text-zinc-400 mb-1 block">2 мес (₽)</label><input id="price2Input" type="number" min="1" class="input"></div>
                </div>
                <div class="flex flex-col gap-2">
                    <button onclick="loadCurrentPrices()" class="btn btn-ghost">Загрузить текущие</button>
                    <button onclick="updatePrices()" id="updatePricesBtn" class="btn btn-amber">Сохранить</button>
                </div>
                <p id="pricesMsg" class="text-xs text-center mt-2 hidden"></p>
            </div>
        </div>

        <div id="section-calculate" class="hidden">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-extrabold text-white">Расчёт</h2>
                <div class="flex items-center gap-2">
                    <button onclick="toggleAdminSheet()" class="md:hidden tabs-btn">Меню ▴</button>
                    <button onclick="window.toggleMobileMenu()" class="md:hidden w-9 h-9 flex items-center justify-center rounded-lg bg-white/5 hover:bg-white/10 active:scale-90 text-white">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                </div>
            </div>
            <div class="widget-card rounded-2xl p-4 mb-3">

                    <div><label class="text-xs text-zinc-400 mb-1 block">Имя и фамилия</label><input id="calcName" type="text" placeholder="Павлов Евгений" class="input"></div>

                    <div><label class="text-xs text-zinc-400 mb-1 block">Дата по</label><input id="calcEndDate" type="date" class="input"></div>

                </div>
                <div class="overflow-x-auto"><table class="w-full text-xs"><thead><tr class="text-zinc-500"><th class="text-left py-1">№</th><th class="text-left py-1">Дата</th><th class="text-left py-1">Турнир</th><th class="text-right py-1">Сумма</th></tr></thead><tbody id="calcTableBody"></tbody></table></div>
            </div>
        </div>

        <div id="section-broadcast" class="hidden">

                    <button onclick="toggleAdminSheet()" class="md:hidden tabs-btn">Меню ▴</button>
                    <button onclick="window.toggleMobileMenu()" class="md:hidden w-9 h-9 flex items-center justify-center rounded-lg bg-white/5 hover:bg-white/10 active:scale-90 text-white">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>

                    </table>

                    <h3 class="text-base font-bold text-white mb-3">По игрокам</h3>
                    <div id="playerStatsContainer"><p class="text-center text-zinc-500 py-4">Загрузка...</p></div>
                </div>
            </div>
        </div>

    </div>

    <div class="tab-sheet-overlay" id="adminSheetOverlay" onclick="toggleAdminSheet()">
        <div class="tab-sheet" onclick="event.stopPropagation()">
            <div class="tab-sheet-handle"></div>
            <button class="tab-sheet-btn active" id="sheet-players" onclick="showSection('players');toggleAdminSheet()">Игроки</button>
            <button class="tab-sheet-btn" id="sheet-subscriptions" onclick="showSection('subscriptions');toggleAdminSheet()">Подписки</button>
            <button class="tab-sheet-btn" id="sheet-prices" onclick="showSection('prices');toggleAdminSheet()">Цены</button>
            <button class="tab-sheet-btn" id="sheet-calculate" onclick="showSection('calculate');toggleAdminSheet()">Расчёт</button>
            <button class="tab-sheet-btn" id="sheet-broadcast" onclick="showSection('broadcast');toggleAdminSheet()">Рассылка</button>
            <button class="tab-sheet-btn" id="sheet-stats" onclick="showSection('stats');toggleAdminSheet()">Статистика</button>
        </div>
    </div>
</main>

<script type="module">
    import { initBurgerMenu } from '/js/modules/burger-menu.js';
    import { initRoleCheck } from '/js/modules/role-check.js';
    initBurgerMenu();
    initRoleCheck();

<script type="module" src="/js/admin-app.js"></script>
<script>
    window.toggleAdminSheet = function() {
        document.getElementById('adminSheetOverlay').classList.toggle('open');
        updateAdminSheetActive();
    };
    function updateAdminSheetActive() {
        const sections = ['players','subscriptions','prices','calculate','broadcast','stats'];
        const active = sections.find(s => !document.getElementById('section-'+s).classList.contains('hidden'));
        document.querySelectorAll('.tab-sheet-btn').forEach(b => b.classList.remove('active'));
        if (active) document.getElementById('sheet-'+active)?.classList.add('active');
    }
    const origShow = window.showSection;
    window.showSection = function(s) {
        origShow(s);
        setTimeout(updateAdminSheetActive, 100);
    };
</script>
<script type="module">
    import { initStars } from '/js/modules/stars.js';
