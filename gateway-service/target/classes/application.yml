server:
  port: 9000

spring:
  application:
    name: gateway-service
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      routes:
        # ===== SWAGGER UI (КОРНЕВОЙ) =====
        - id: swagger-ui-root
          uri: lb://user-service
          predicates:
            - Path=/swagger-ui.html, /swagger-ui/**
          filters:
            - StripPrefix=0

        # ===== SWAGGER API DOCS ДЛЯ КАЖДОГО СЕРВИСА =====
        - id: user-service-api-docs
          uri: lb://user-service
          predicates:
            - Path=/user-service/v3/api-docs/**
          filters:
            - StripPrefix=1

        - id: tournament-service-api-docs
          uri: lb://tournament-service
          predicates:
            - Path=/tournament-service/v3/api-docs/**
          filters:
            - StripPrefix=1

        - id: payment-service-api-docs
          uri: lb://payment-service
          predicates:
            - Path=/payment-service/v3/api-docs/**
          filters:
            - StripPrefix=1

        - id: notification-service-api-docs
          uri: lb://notification-service
          predicates:
            - Path=/notification-service/v3/api-docs/**
          filters:
            - StripPrefix=1

        - id: admin-service-api-docs
          uri: lb://admin-service
          predicates:
            - Path=/admin-service/v3/api-docs/**
          filters:
            - StripPrefix=1

        # ===== СТАТИКА =====
        - id: static
          uri: lb://user-service
          predicates:
            - Path=/, /index.html, /register.html, /dashboard.html, /profile.html,
              /subscribe.html, /admin.html, /analytics.html, /oauth-finish.html,
              /live.html, /live-tournament.html, /css/**, /js/**, /img.png, /favicon.ico,
              /manifest.json, /robots.txt, /sw.js, /push.js

        # ===== СТРАНИЦЫ =====
        - id: pages
          uri: lb://user-service
          predicates:
            - Path=/dashboard, /profile, /subscribe, /admin, /analytics, /live, /live-tournament, /oauth-finish, /register

        # ===== OAUTH =====
        - id: user-service-oauth
          uri: lb://user-service
          predicates:
            - Path=/login/**, /oauth2/**

        # ===== USER-SERVICE API =====
        - id: user-service-api
          uri: lb://user-service
          predicates:
            - Path=/api/player/**, /api/auth/**, /api/push/**, /api/players, /api/shared/**, /online/**

        # ===== TOURNAMENT-SERVICE =====
        - id: tournament-service
          uri: lb://tournament-service
          predicates:
            - Path=/api/tournaments/**, /api/tournament/**, /api/lineups/**, /api/live/**, /api/online/**

        # ===== NOTIFICATION-SERVICE =====
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/internal/notification/**

        # ===== PAYMENT-SERVICE =====
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/prices/**, /api/payment/**, /api/pay/**

        # ===== ADMIN-SERVICE =====
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/admin/**

eureka:
  instance:
    preferIpAddress: true
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty: INFO

# ===== SPRINGDOC (SWAGGER AGGREGATOR) =====
springdoc:
  api-docs:
    enabled: true
    resolve-schema-properties: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: user-service
        url: /user-service/v3/api-docs
      - name: tournament-service
        url: /tournament-service/v3/api-docs
      - name: payment-service
        url: /payment-service/v3/api-docs
      - name: notification-service
        url: /notification-service/v3/api-docs
      - name: admin-service
        url: /admin-service/v3/api-docs
    urls-primary-name: user-service